<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الأستاذ أحمد شعبان | الإصدار الاحترافي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #050505; color: #e2e8f0; user-select: none; -webkit-user-select: none; overflow-x: hidden; }
        .glass { background: rgba(15, 15, 15, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(212, 175, 55, 0.1); }
        .gold-text { color: #d4af37; }
        .gold-bg { background: #d4af37; }
        
        /* العلامة المائية المحسنة */
        #watermark-protected {
            position: absolute; z-index: 9999; pointer-events: none;
            color: rgba(255, 255, 255, 0.7); font-size: 24px; 
            font-weight: 900; white-space: nowrap; 
            text-shadow: 2px 2px 5px #000;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #custom-player-container {
            position: relative; width: 100%; max-width: 900px; aspect-ratio: 16/9;
            background: #000; border-radius: 20px; overflow: hidden;
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.1);
        }

        video { width: 100%; height: 100%; }

        /* إشعارات المنصة */
        .toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-150%);
            padding: 15px 30px; border-radius: 15px; background: #111; border: 1px solid #d4af37;
            color: white; z-index: 10000; transition: 0.5s; font-weight: bold;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body class="min-h-screen flex flex-col" oncontextmenu="return false;">

    <nav class="glass sticky top-0 z-[100] p-4 flex justify-between items-center border-b border-white/5">
        <div class="flex items-center gap-4">
            <h1 class="text-xl font-black gold-text italic">أحمد شعبان</h1>
            <div class="hidden md:block text-xs bg-white/5 p-2 rounded-lg">
                <span id="user-name">...</span> | 
                <span class="gold-text">المحفظة: <span id="user-wallet">0</span> ج.م</span>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <button onclick="location.href='index.html'" class="text-gray-400"><i class="fas fa-home"></i></button>
            <button onclick="logout()" class="text-red-500 text-xs font-bold">خروج</button>
        </div>
    </nav>

    <div id="admin-panel" class="hidden m-4 p-6 glass rounded-2xl border-gold-text/20">
        <div class="flex flex-wrap gap-4 items-center">
            <h3 class="gold-text font-black ml-4">لوحة المستر:</h3>
            <button onclick="openPkgModal()" class="bg-gold-text text-black px-4 py-2 rounded-lg font-bold text-xs">إضافة باقة</button>
            <button onclick="openLecModal()" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold text-xs">إضافة محاضرة</button>
            <button onclick="toggleAdminView('logs')" class="bg-white/10 px-4 py-2 rounded-lg font-bold text-xs">سجل المشاهدات</button>
        </div>
        
        <div id="admin-logs-view" class="mt-6 hidden max-h-60 overflow-y-auto">
            <table class="w-full text-right text-xs">
                <thead class="sticky top-0 bg-black text-gold-text">
                    <tr><th class="p-2">الطالب</th><th class="p-2">الفيديو</th><th class="p-2">التوقيت</th></tr>
                </thead>
                <tbody id="logs-body"></tbody>
            </table>
        </div>
    </div>

    <main class="flex-1 p-6">
        <div class="max-w-6xl mx-auto">
            <div class="flex justify-between items-center mb-10">
                <h2 id="view-title" class="text-2xl font-black italic">محتوى المنصة</h2>
                <button id="back-btn" class="hidden gold-text font-bold" onclick="loadPackages()">العودة للباقات <i class="fas fa-arrow-left"></i></button>
            </div>
            <div id="dynamic-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
        </div>
    </main>

    <section id="player-view" class="hidden fixed inset-0 z-[500] bg-black/98 flex flex-col items-center justify-center p-4">
        <div id="custom-player-container">
            <div id="watermark-protected"></div>
            <video id="video-engine" controls controlsList="nodownload" oncontextmenu="return false;"></video>
            <button onclick="closeVideo()" class="absolute top-4 right-4 bg-red-600 text-white w-10 h-10 rounded-full z-[600]"><i class="fas fa-times"></i></button>
        </div>
        <h3 id="playing-title" class="mt-6 text-xl gold-text font-black italic"></h3>
    </section>

    <div id="pkg-modal" class="hidden fixed inset-0 z-[1000] bg-black/90 flex items-center justify-center p-4">
        <div class="glass w-full max-w-md p-8 rounded-3xl">
            <h3 class="gold-text font-black mb-4">بيانات الباقة الجديدة</h3>
            <input id="p-name" type="text" placeholder="اسم الباقة" class="w-full bg-white/5 p-4 rounded-xl mb-3 outline-none border border-white/10">
            <input id="p-price" type="number" placeholder="السعر" class="w-full bg-white/5 p-4 rounded-xl mb-4 outline-none border border-white/10">
            <button onclick="savePackage()" class="w-full gold-bg text-black font-black p-4 rounded-xl">حفظ</button>
            <button onclick="toggleModal('pkg-modal')" class="w-full mt-4 text-gray-500">إلغاء</button>
        </div>
    </div>

    <div id="lec-modal" class="hidden fixed inset-0 z-[1000] bg-black/90 flex items-center justify-center p-4">
        <div class="glass w-full max-w-md p-8 rounded-3xl">
            <h3 class="text-blue-500 font-black mb-4">بيانات المحاضرة</h3>
            <select id="l-target" class="w-full bg-black border border-white/10 p-4 rounded-xl mb-3"></select>
            <input id="l-name" type="text" placeholder="عنوان المحاضرة" class="w-full bg-white/5 p-4 rounded-xl mb-3 outline-none border border-white/10">
            <input id="l-url" type="text" placeholder="رابط الفيديو المباشر" class="w-full bg-white/5 p-4 rounded-xl mb-4 outline-none border border-white/10">
            <label class="flex items-center gap-2 mb-4 cursor-pointer">
                <input type="checkbox" id="l-exam" class="w-5 h-5"> <span>إضافة امتحان لهذه المحاضرة</span>
            </label>
            <button onclick="saveLecture()" class="w-full bg-blue-600 text-white font-black p-4 rounded-xl">نشر المحاضرة</button>
            <button onclick="toggleModal('lec-modal')" class="w-full mt-4 text-gray-500">إلغاء</button>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBfkxj5I7UOEETOf9GRqGgqEaEoqPtPMek",
            authDomain: "mrahmed-925d8.firebaseapp.com",
            databaseURL: "https://mrahmed-925d8-default-rtdb.firebaseio.com",
            projectId: "mrahmed-925d8",
            storageBucket: "mrahmed-925d8.firebasestorage.app",
            messagingSenderId: "83939909031",
            appId: "1:83939909031:web:adb0b10d41b9df6c602a82"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const userPhone = localStorage.getItem('userLoggedIn');
        let currentUser = null;

        // التحقق من المستخدم والحظر
        db.ref('students/' + userPhone).on('value', (snap) => {
            currentUser = snap.val();
            if (!currentUser || currentUser.status === 'blocked') {
                location.href = 'contact.html'; return;
            }
            document.getElementById('user-name').innerText = currentUser.name;
            document.getElementById('user-wallet').innerText = currentUser.wallet || 0;
            if (currentUser.role === 'admin') document.getElementById('admin-panel').classList.remove('hidden');
            loadPackages();
        });

        // نظام الباقات والمحفظة
        function loadPackages() {
            document.getElementById('back-btn').classList.add('hidden');
            const grid = document.getElementById('dynamic-grid');
            grid.innerHTML = '';
            db.ref('packages').once('value', s => {
                s.forEach(child => {
                    const p = child.val();
                    const owned = (currentUser.purchasedPackages && currentUser.purchasedPackages[child.key]) || currentUser.role === 'admin';
                    grid.innerHTML += `
                        <div class="glass p-6 rounded-3xl border border-white/5 hover:border-gold-text transition-all">
                            <h3 class="text-xl font-bold italic mb-4">${p.name}</h3>
                            <div class="flex justify-between items-center">
                                <span class="gold-text font-black">${p.price} ج.م</span>
                                <button onclick="${owned ? `loadLectures('${child.key}', '${p.name}')` : `buyPkg('${child.key}', ${p.price})`}" 
                                    class="${owned ? 'bg-white/10' : 'gold-bg text-black'} px-6 py-2 rounded-xl text-xs font-black">
                                    ${owned ? 'دخول' : 'شراء الآن'}
                                </button>
                            </div>
                        </div>`;
                });
            });
        }

        async function buyPkg(id, price) {
            const wallet = currentUser.wallet || 0;
            if (wallet < price) return showToast("عذراً، رصيدك في المحفظة لا يكفي!");
            if (confirm(`خصم ${price} ج.م من محفظتك؟`)) {
                await db.ref(`students/${userPhone}`).update({
                    wallet: wallet - price,
                    [`purchasedPackages/${id}`]: true
                });
                showToast("تم الاشتراك بنجاح!");
            }
        }

        // المحاضرات والامتحانات
        function loadLectures(pkgId, pkgName) {
            document.getElementById('back-btn').classList.remove('hidden');
            document.getElementById('view-title').innerText = pkgName;
            const grid = document.getElementById('dynamic-grid');
            grid.innerHTML = '';
            db.ref(`lectures/${pkgId}`).on('value', s => {
                grid.innerHTML = '';
                s.forEach(c => {
                    const l = c.val();
                    grid.innerHTML += `
                        <div class="glass p-5 rounded-2xl flex flex-col gap-4">
                            <h4 class="font-bold text-sm"><i class="fas fa-play-circle gold-text ml-2"></i> ${l.name}</h4>
                            <div class="grid grid-cols-2 gap-2">
                                <button onclick="startVideo('${l.url}', '${l.name}')" class="bg-gold-text text-black py-2 rounded-lg text-xs font-black">مشاهدة</button>
                                ${l.hasExam ? `<button onclick="location.href='exams.html?id=${c.key}'" class="bg-blue-600 text-white py-2 rounded-lg text-xs font-bold">الامتحان</button>` : ''}
                            </div>
                        </div>`;
                });
            });
        }

        // فيديو وعلامة مائية
        function startVideo(url, title) {
            const player = document.getElementById('player-view');
            const video = document.getElementById('video-engine');
            document.getElementById('playing-title').innerText = title;
            player.classList.remove('hidden');

            if (Hls.isSupported() && url.includes('.m3u8')) {
                const hls = new Hls(); hls.loadSource(url); hls.attachMedia(video);
            } else { video.src = url; }
            video.play();

            // سجل للمستر
            db.ref('admin/watch_logs').push({
                student: currentUser.name,
                phone: userPhone,
                video: title,
                time: new Date().toLocaleString('ar-EG')
            });

            moveWM();
            window.wmInt = setInterval(moveWM, 3000);
        }

        function moveWM() {
            const wm = document.getElementById('watermark-protected');
            const cont = document.getElementById('custom-player-container');
            wm.innerText = `${userPhone} | ${currentUser.name}`;
            const x = Math.random() * (cont.clientWidth - 200);
            const y = Math.random() * (cont.clientHeight - 50);
            wm.style.transform = `translate(${x}px, ${y}px)`;
            wm.style.opacity = Math.random() * 0.5 + 0.3;
        }

        function closeVideo() {
            const v = document.getElementById('video-engine');
            v.pause(); v.src = "";
            document.getElementById('player-view').classList.add('hidden');
            clearInterval(window.wmInt);
        }

        // وظائف الأدمن
        function toggleAdminView(type) {
            const v = document.getElementById('admin-logs-view');
            const b = document.getElementById('logs-body');
            v.classList.remove('hidden'); b.innerHTML = '';
            db.ref('admin/watch_logs').limitToLast(50).once('value', s => {
                s.forEach(c => {
                    const l = c.val();
                    b.innerHTML = `<tr><td class="p-2">${l.student}</td><td class="p-2">${l.video}</td><td class="p-2">${l.time}</td></tr>` + b.innerHTML;
                });
            });
        }

        function savePackage() {
            const n = document.getElementById('p-name').value;
            const p = document.getElementById('p-price').value;
            if(n && p) db.ref('packages').push({name:n, price:p}).then(() => { toggleModal('pkg-modal'); loadPackages(); });
        }

        function openLecModal() {
            const s = document.getElementById('l-target'); s.innerHTML = '';
            db.ref('packages').once('value', snap => {
                snap.forEach(p => s.innerHTML += `<option value="${p.key}">${p.val().name}</option>`);
                toggleModal('lec-modal');
            });
        }

        function saveLecture() {
            const id = document.getElementById('l-target').value;
            const data = {
                name: document.getElementById('l-name').value,
                url: document.getElementById('l-url').value,
                hasExam: document.getElementById('l-exam').checked
            };
            db.ref(`lectures/${id}`).push(data).then(() => toggleModal('lec-modal'));
        }

        function showToast(m) {
            const t = document.getElementById('toast'); t.innerText = m;
            t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000);
        }

        function toggleModal(id) { document.getElementById(id).classList.toggle('hidden'); }
        function logout() { localStorage.removeItem('userLoggedIn'); location.href='go.html'; }

        // حماية Console (النسخة المستقرة)
        (function() {
            let devtools = function() {};
            devtools.toString = function() {
                db.ref(`security_alerts/${userPhone}`).set({
                    name: currentUser.name,
                    reason: "حاولة فتح Console",
                    time: new Date().toLocaleString()
                });
                return "";
            };
            console.log("%c", devtools);
        }());
    </script>
</body>
</html>
