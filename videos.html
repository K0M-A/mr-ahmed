<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الأستاذ أحمد شعبان | المحاضرات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #050505; color: #e2e8f0; user-select: none; -webkit-user-select: none; }
        .glass { background: rgba(15, 15, 15, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(212, 175, 55, 0.1); }
        .gold-text { color: #d4af37; }
        .gold-bg { background: #d4af37; }
        
        /* العلامة المائية المحمية */
        #watermark-protected {
            position: absolute; z-index: 999999; pointer-events: none;
            color: rgba(255, 255, 255, 0.2); font-size: 16px; font-weight: bold;
            white-space: nowrap; text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            transition: all 0.5s ease-in-out;
        }

        /* منع تصوير الشاشة في بعض المتصفحات */
        @media screen { video { filter: brightness(100%); } }
        video::-webkit-media-controls-download-button { display:none; }
        video::-webkit-media-controls-enclosure { overflow:hidden; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="glass sticky top-0 z-50 p-4 flex justify-between items-center border-b border-white/5">
        <div class="flex items-center gap-4">
            <a href="index.html" class="gold-text text-xl"><i class="fa-solid fa-house"></i></a>
            <h1 class="text-lg font-black italic">أحمد <span class="gold-text">شعبان</span></h1>
        </div>
        <div class="flex items-center gap-4">
            <button onclick="window.location.href='exams.html'" class="bg-white/5 border border-gold-text text-gold-text px-3 py-1 rounded-lg text-xs hover:bg-gold-text hover:text-black transition font-bold">
                <i class="fas fa-pen-nib ml-1"></i> امتحن الآن
            </button>
            <div class="text-left border-r border-white/10 pr-4 hidden md:block">
                <p id="user-name" class="text-sm font-bold italic">...</p>
                <p id="user-role-display" class="text-[10px] gold-text opacity-70 italic font-bold uppercase"></p>
            </div>
        </div>
    </nav>

    <div id="admin-panel" class="hidden bg-white/5 border-b border-gold-text/20 p-6 animate-pulse">
        <div class="max-w-6xl mx-auto">
            <h2 class="gold-text font-black mb-4"><i class="fas fa-user-shield ml-2"></i> لوحة التحكم في المحتوى</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <button onclick="toggleModal('package-modal')" class="bg-gold-text text-black p-3 rounded-xl font-bold hover:scale-105 transition">إضافة باقة جديدة (250ج)</button>
                <button onclick="toggleModal('lecture-modal')" class="bg-blue-600 text-white p-3 rounded-xl font-bold hover:scale-105 transition">إضافة محاضرة/فيديو</button>
                <button onclick="toggleModal('logs-modal')" class="bg-white/10 text-white p-3 rounded-xl font-bold hover:scale-105 transition border border-white/10">سجلات المشاهدة</button>
            </div>
        </div>
    </div>

    <main class="flex-1 p-6 lg:p-10">
        <div class="max-w-6xl mx-auto">
            <div class="flex justify-between items-end mb-8">
                <div>
                    <h2 id="view-title" class="text-3xl font-black text-white italic">الباقات المتاحة</h2>
                    <p class="text-gray-500 text-sm mt-2">اختر الباقة الدراسية لبدء التعلم بعمق</p>
                </div>
                <button id="back-to-pkgs" class="hidden text-gold-text font-bold" onclick="loadPackages()"><i class="fas fa-arrow-right ml-2"></i> العودة للباقات</button>
            </div>
            
            <div id="dynamic-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                </div>
        </div>
    </main>

    <section id="player-view" class="hidden fixed inset-0 z-[200] bg-black flex flex-col items-center justify-center p-0 lg:p-10">
        <div class="w-full max-w-5xl relative aspect-video bg-black shadow-[0_0_100px_rgba(212,175,55,0.1)] group rounded-2xl overflow-hidden">
            <div id="watermark-protected"></div> <video id="video-engine" class="w-full h-full" controlsList="nodownload"></video>
            <button onclick="closeVideo()" class="absolute top-5 right-5 z-[210] bg-red-600 text-white w-12 h-12 rounded-full opacity-0 group-hover:opacity-100 transition"><i class="fas fa-times"></i></button>
        </div>
        <h3 id="playing-title" class="mt-6 text-2xl font-black gold-text italic"></h3>
    </section>

    <div id="package-modal" class="hidden fixed inset-0 z-[300] bg-black/95 flex items-center justify-center p-4">
        <div class="glass w-full max-w-md p-8 rounded-3xl">
            <h3 class="gold-text text-xl font-black mb-6">إنشاء باقة دراسية</h3>
            <input id="pkg-name" type="text" placeholder="اسم الباقة" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl mb-4 focus:outline-none focus:border-gold-text">
            <textarea id="pkg-desc" placeholder="وصف الباقة" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl mb-6"></textarea>
            <button onclick="savePackage()" class="w-full gold-bg text-black font-black p-4 rounded-xl">حفظ الباقة (250 ج.م)</button>
            <button onclick="toggleModal('package-modal')" class="w-full text-gray-500 mt-4">إلغاء</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBfkxj5I7UOEETOf9GRqGgqEaEoqPtPMek",
            authDomain: "mrahmed-925d8.firebaseapp.com",
            databaseURL: "https://mrahmed-925d8-default-rtdb.firebaseio.com",
            projectId: "mrahmed-925d8",
            storageBucket: "mrahmed-925d8.firebasestorage.app",
            messagingSenderId: "83939909031",
            appId: "1:83939909031:web:adb0b10d41b9df6c602a82"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const userPhone = localStorage.getItem('userLoggedIn');
        let currentUser = null;

        if (!userPhone) window.location.href = 'go.html';

        // 1. التحقق من الهوية والصلاحيات
        db.ref('students/' + userPhone).on('value', (snap) => {
            currentUser = snap.val();
            if (!currentUser || currentUser.status === 'blocked') {
                localStorage.clear(); window.location.href = 'go.html'; return;
            }
            
            document.getElementById('user-name').innerText = currentUser.name;
            document.getElementById('user-role-display').innerText = currentUser.role === 'admin' ? 'مدير المنصة' : 'طالب';
            document.getElementById('watermark-protected').innerText = `${currentUser.name} | ${userPhone}`;
            
            if (currentUser.role === 'admin') document.getElementById('admin-panel').classList.remove('hidden');
            
            loadPackages();
        });

        // 2. إدارة الباقات
        function loadPackages() {
            document.getElementById('back-to-pkgs').classList.add('hidden');
            document.getElementById('view-title').innerText = "الباقات المتاحة";
            const grid = document.getElementById('dynamic-grid');
            grid.innerHTML = '<p class="col-span-full text-center gold-text">جاري جلب الباقات الملكية...</p>';

            db.ref('packages').once('value', (snap) => {
                grid.innerHTML = '';
                if (!snap.exists()) { grid.innerHTML = '<p class="col-span-full text-center">لا يوجد باقات حالياً.</p>'; return; }
                
                snap.forEach((child) => {
                    const pkg = child.val();
                    const div = document.createElement('div');
                    div.className = "glass p-8 rounded-[2.5rem] border border-white/5 hover:border-gold-text transition-all cursor-pointer group relative overflow-hidden";
                    div.innerHTML = `
                        <div class="absolute -right-5 -top-5 bg-gold-text/10 p-10 rounded-full group-hover:bg-gold-text/20 transition-all"><i class="fas fa-box-open text-3xl gold-text"></i></div>
                        <h3 class="text-2xl font-black mb-3 italic">${pkg.name}</h3>
                        <p class="text-gray-500 text-sm leading-relaxed mb-6">${pkg.desc}</p>
                        <div class="flex justify-between items-center border-t border-white/10 pt-6">
                            <span class="text-xl font-black gold-text italic">250 ج.م</span>
                            <i class="fas fa-chevron-left text-xs opacity-50 group-hover:translate-x-[-5px] transition-transform"></i>
                        </div>
                    `;
                    div.onclick = () => loadLectures(child.key, pkg.name);
                    grid.appendChild(div);
                });
            });
        }

        // 3. إدارة المحاضرات (داخل الباقة)
        function loadLectures(pkgId, pkgName) {
            document.getElementById('back-to-pkgs').classList.remove('hidden');
            document.getElementById('view-title').innerText = pkgName;
            const grid = document.getElementById('dynamic-grid');
            grid.innerHTML = '';

            db.ref(`lectures/${pkgId}`).once('value', (snap) => {
                if (!snap.exists()) { grid.innerHTML = '<p class="col-span-full text-center opacity-50">هذه الباقة فارغة حالياً.</p>'; return; }
                
                snap.forEach((child) => {
                    const lec = child.val();
                    const div = document.createElement('div');
                    div.className = "glass p-4 rounded-2xl flex items-center gap-4 hover:bg-white/5 transition cursor-pointer border border-white/5";
                    div.innerHTML = `
                        <div class="w-14 h-14 gold-bg rounded-xl flex items-center justify-center text-black font-black italic shadow-lg shadow-gold-text/20">LEC</div>
                        <div class="flex-1">
                            <h4 class="font-bold">${lec.name}</h4>
                            <p class="text-[10px] text-gray-500 uppercase font-black tracking-widest mt-1">${lec.duration || 'مدتها غير محددة'}</p>
                        </div>
                        <div class="bg-white/10 p-3 rounded-full"><i class="fas fa-play text-[10px] gold-text"></i></div>
                    `;
                    div.onclick = () => startLearning(lec.url, lec.name, child.key);
                    grid.appendChild(div);
                });
            });
        }

        // 4. نظام الحماية والعلامة المائية
        function startLearning(url, title, lecId) {
            const player = document.getElementById('player-view');
            const video = document.getElementById('video-engine');
            document.getElementById('playing-title').innerText = title;
            player.classList.remove('hidden');

            if (Hls.isSupported() && url.includes('.m3u8')) {
                const hls = new Hls(); hls.loadSource(url); hls.attachMedia(video);
            } else {
                video.src = url;
            }
            video.play();

            // تسجيل السجل للأدمن
            db.ref(`admin/watch_logs/${userPhone}`).push({
                studentName: currentUser.name,
                videoTitle: title,
                time: new Date().toLocaleString(),
                timestamp: firebase.database.ServerValue.TIMESTAMP
            });

            // تحريك العلامة المائية
            moveWatermark();
            window.watermarkInterval = setInterval(moveWatermark, 6000);
        }

        function moveWatermark() {
            const wm = document.getElementById('watermark-protected');
            const videoContainer = wm.parentElement;
            const maxX = videoContainer.clientWidth - wm.clientWidth - 20;
            const maxY = videoContainer.clientHeight - wm.clientHeight - 20;
            wm.style.left = Math.max(10, Math.random() * maxX) + 'px';
            wm.style.top = Math.max(10, Math.random() * maxY) + 'px';
        }

        function closeVideo() {
            const video = document.getElementById('video-engine');
            video.pause(); video.src = "";
            document.getElementById('player-view').classList.add('hidden');
            clearInterval(window.watermarkInterval);
        }

        // 5. وظائف الأدمن (الأدوات)
        function savePackage() {
            const name = document.getElementById('pkg-name').value;
            const desc = document.getElementById('pkg-desc').value;
            if (!name || !desc) return alert("املا البيانات يا بطل");
            
            db.ref('packages').push({ name, desc, price: 250 }).then(() => {
                alert("تم إضافة الباقة بنجاح!");
                toggleModal('package-modal');
                loadPackages();
            });
        }

        function toggleModal(id) { document.getElementById(id).classList.toggle('hidden'); }

        // منع التحميل والكليك يمين
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = (e) => {
            if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74))) return false;
        }
    </script>
</body>
</html>
