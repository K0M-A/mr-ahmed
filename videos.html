<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المحاضرات | منصة الأستاذ أحمد شعبان</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#0f172a',
                        darker: '#020617',
                        neonRed: '#d4af37', // تم تغيير اللون للذهبي ليتماشى مع الهوية
                    }
                }
            }
        }
    </script>
    <style>
        body { -webkit-user-select: none; user-select: none; background-color: #050505; color: #e2e8f0; font-family: 'Cairo', sans-serif; }
        .video-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; background: transparent; }
        .glass { background: rgba(10, 10, 10, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(212, 175, 55, 0.1); }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <nav class="glass p-4 flex justify-between items-center z-20 border-b border-white/5">
        <div class="flex items-center gap-3">
            <a href="index.html" class="text-neonRed text-xl"><i class="fa-solid fa-arrow-right"></i></a>
            <h1 class="text-lg font-bold">محاضرات <span class="text-neonRed">الفيلسوف</span></h1>
        </div>
        <div class="text-left">
            <p id="user-display-name" class="text-sm font-bold text-white">جاري التحميل...</p>
            <p id="user-display-balance" class="text-[10px] text-neonRed">الرصيد: 0 ج.م</p>
        </div>
    </nav>

    <main class="flex-1 overflow-y-auto p-4 lg:p-8">
        <div class="max-w-6xl mx-auto">
            <h2 id="section-title" class="text-2xl font-bold mb-8 text-white border-r-4 border-neonRed pr-4">الباقات المتاحة</h2>
            
            <div id="dynamic-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                </div>
        </div>
    </main>

    <section id="player-section" class="hidden fixed inset-0 z-[100] bg-black flex flex-col p-4">
        <div class="flex justify-between items-center mb-4">
            <button id="close-player" class="text-white bg-white/10 px-4 py-2 rounded-xl"><i class="fa-solid fa-xmark ml-2"></i> إغلاق</button>
            <div id="watermark" class="text-white/20 text-xs pointer-events-none select-none absolute"></div>
        </div>
        <div class="relative flex-1 bg-darker rounded-2xl overflow-hidden border border-white/10 shadow-2xl">
            <div class="video-overlay"></div>
            <video id="main-video" class="w-full h-full" controls controlsList="nodownload"></video>
        </div>
    </section>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        // --- إعدادات Firebase ---
        const firebaseConfig = {
            apiKey: "AIzaSyBfkxj5I7UOEETOf9GRqGgqEaEoqPtPMek",
            authDomain: "mrahmed-925d8.firebaseapp.com",
            databaseURL: "https://mrahmed-925d8-default-rtdb.firebaseio.com",
            projectId: "mrahmed-925d8",
            storageBucket: "mrahmed-925d8.firebasestorage.app",
            messagingSenderId: "83939909031",
            appId: "1:83939909031:web:adb0b10d41b9df6c602a82"
        };
        
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();

        // --- المتغيرات الأساسية (منطق الرئيسية) ---
        const userPhone = localStorage.getItem('userLoggedIn');
        const sessionID = "sess_" + Math.random().toString(36).substring(7);

        // --- فحص الأمان والدخول ---
        if (!userPhone) {
            window.location.href = "go.html";
        } else {
            initApp();
        }

        function initApp() {
            // 1. نظام الجلسات (عشان ميسجلش خروج)
            const sessionRef = db.ref('students/' + userPhone + '/currentSession');
            sessionRef.set(sessionID);
            sessionRef.on('value', (snapshot) => {
                if (snapshot.val() && snapshot.val() !== sessionID) {
                    alert("تم تسجيل الدخول من جهاز آخر.");
                    logout();
                }
            });

            // 2. جلب بيانات المستخدم الحقيقية
            db.ref('students/' + userPhone).on('value', (snapshot) => {
                const data = snapshot.val();
                if (!data) { logout(); return; }
                if (data.status === "blocked") { window.location.href = "contact.html"; return; }
                
                document.getElementById('user-display-name').innerText = data.name;
                document.getElementById('user-display-balance').innerText = "الرصيد: " + (data.balance || 0) + " ج.م";

                // تحميل الباقات
                loadPackages();
            });
        }

        function loadPackages() {
            db.ref('packages').on('value', (snapshot) => {
                const container = document.getElementById('dynamic-container');
                container.innerHTML = '';
                const pkgs = snapshot.val();
                
                if (!pkgs) {
                    container.innerHTML = '<p class="text-center col-span-full opacity-50">لا توجد باقات متاحة حالياً</p>';
                    return;
                }

                Object.keys(pkgs).forEach(id => {
                    const pkg = pkgs[id];
                    const div = document.createElement('div');
                    div.className = "glass p-6 rounded-3xl border border-white/5 hover:border-neonRed transition-all cursor-pointer group";
                    div.innerHTML = `
                        <div class="mb-4 text-neonRed text-3xl"><i class="fa-solid fa-box-archive"></i></div>
                        <h3 class="text-xl font-bold text-white mb-2">${pkg.name}</h3>
                        <p class="text-sm text-gray-500 line-clamp-2">${pkg.desc || 'وصف المحاضرة...'}</p>
                        <div class="mt-6 pt-4 border-t border-white/5 flex justify-between items-center">
                            <span class="text-neonRed font-bold">${pkg.price || 0} ج.م</span>
                            <span class="bg-neonRed/10 text-neonRed text-[10px] px-3 py-1 rounded-full">فتح المحاضرة</span>
                        </div>
                    `;
                    div.onclick = () => alert("سيتم فتح المحاضرة: " + pkg.name);
                    container.appendChild(div);
                });
            });
        }

        function logout() {
            localStorage.clear();
            window.location.href = "go.html";
        }

        // حماية المحتوى (نفس كودك)
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
