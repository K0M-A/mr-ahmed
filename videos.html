<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الأستاذ أحمد شعبان | المحاضرات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #050505; color: #e2e8f0; user-select: none; -webkit-user-select: none; }
        .glass { background: rgba(15, 15, 15, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(212, 175, 55, 0.1); }
        .gold-text { color: #d4af37; }
        .gold-bg { background: #d4af37; }
        
        #watermark-protected {
            position: absolute; z-index: 999999; pointer-events: none;
            color: rgba(255, 255, 255, 0.25); font-size: 14px; font-weight: bold;
            white-space: nowrap; text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            transition: all 0.6s ease-in-out;
        }

        video::-webkit-media-controls-download-button { display:none; }
        video::-webkit-media-controls-enclosure { overflow:hidden; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="glass sticky top-0 z-50 p-4 flex justify-between items-center border-b border-white/5">
        <div class="flex items-center gap-4">
            <a href="index.html" class="gold-text text-xl"><i class="fa-solid fa-house"></i></a>
            <h1 class="text-lg font-black italic">أحمد <span class="gold-text">شعبان</span></h1>
        </div>
        <div class="flex items-center gap-4 text-left">
            <div class="border-r border-white/10 pr-4 hidden md:block">
                <p id="user-name" class="text-sm font-bold italic">...</p>
                <p id="user-role-display" class="text-[10px] gold-text opacity-70 italic font-bold uppercase"></p>
            </div>
        </div>
    </nav>

    <div id="admin-panel" class="hidden bg-white/5 border-b border-gold-text/20 p-6">
        <div class="max-w-6xl mx-auto">
            <h2 class="gold-text font-black mb-4"><i class="fas fa-user-shield ml-2"></i> لوحة التحكم</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <button onclick="toggleModal('package-modal')" class="bg-gold-text text-black p-3 rounded-xl font-bold hover:scale-105 transition">إضافة باقة جديدة</button>
                <button onclick="openLectureModal()" class="bg-blue-600 text-white p-3 rounded-xl font-bold hover:scale-105 transition">إضافة محاضرة جديدة</button>
            </div>
        </div>
    </div>

    <main class="flex-1 p-6 lg:p-10">
        <div class="max-w-6xl mx-auto">
            <div class="flex justify-between items-end mb-8">
                <div>
                    <h2 id="view-title" class="text-3xl font-black text-white italic">الباقات المتاحة</h2>
                    <p class="text-gray-500 text-sm mt-2">اختر الباقة لمتابعة دروسك</p>
                </div>
                <button id="back-to-pkgs" class="hidden text-gold-text font-bold" onclick="loadPackages()">
                    <i class="fas fa-arrow-right ml-2"></i> العودة للباقات
                </button>
            </div>
            
            <div id="dynamic-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
        </div>
    </main>

    <section id="player-view" class="hidden fixed inset-0 z-[200] bg-black flex flex-col items-center justify-center p-4">
        <div class="w-full max-w-5xl relative aspect-video bg-black rounded-2xl overflow-hidden group">
            <div id="watermark-protected"></div>
            <video id="video-engine" class="w-full h-full" controls controlsList="nodownload"></video>
            <button onclick="closeVideo()" class="absolute top-5 right-5 z-[210] bg-red-600 text-white w-10 h-10 rounded-full opacity-0 group-hover:opacity-100 transition">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <h3 id="playing-title" class="mt-6 text-xl font-black gold-text italic"></h3>
    </section>

    <div id="package-modal" class="hidden fixed inset-0 z-[300] bg-black/95 flex items-center justify-center p-4">
        <div class="glass w-full max-w-md p-8 rounded-3xl">
            <h3 class="gold-text text-xl font-black mb-6">إنشاء باقة دراسية</h3>
            <input id="pkg-name" type="text" placeholder="اسم الباقة" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl mb-4 focus:outline-none focus:border-gold-text">
            <textarea id="pkg-desc" placeholder="وصف الباقة" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl mb-6"></textarea>
            <button onclick="savePackage()" class="w-full gold-bg text-black font-black p-4 rounded-xl">حفظ الباقة</button>
            <button onclick="toggleModal('package-modal')" class="w-full text-gray-500 mt-4">إلغاء</button>
        </div>
    </div>

    <div id="lecture-modal" class="hidden fixed inset-0 z-[300] bg-black/95 flex items-center justify-center p-4">
        <div class="glass w-full max-w-md p-8 rounded-3xl">
            <h3 class="gold-text text-xl font-black mb-6">إضافة محاضرة جديدة</h3>
            <select id="target-pkg" class="w-full bg-black border border-white/10 p-4 rounded-xl mb-4 text-white"></select>
            <input id="lec-name" type="text" placeholder="اسم المحاضرة" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl mb-4">
            <input id="lec-url" type="text" placeholder="رابط الفيديو (Direct or M3U8)" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl mb-6">
            <button onclick="saveLecture()" class="w-full bg-blue-600 text-white font-black p-4 rounded-xl">حفظ المحاضرة</button>
            <button onclick="toggleModal('lecture-modal')" class="w-full text-gray-500 mt-4">إلغاء</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBfkxj5I7UOEETOf9GRqGgqEaEoqPtPMek",
            authDomain: "mrahmed-925d8.firebaseapp.com",
            databaseURL: "https://mrahmed-925d8-default-rtdb.firebaseio.com",
            projectId: "mrahmed-925d8",
            storageBucket: "mrahmed-925d8.firebasestorage.app",
            messagingSenderId: "83939909031",
            appId: "1:83939909031:web:adb0b10d41b9df6c602a82"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const userPhone = localStorage.getItem('userLoggedIn');
        let currentUser = null;

        if (!userPhone) window.location.href = 'go.html';

        // 1. Auth Check
        db.ref('students/' + userPhone).on('value', (snap) => {
            currentUser = snap.val();
            if (!currentUser || currentUser.status === 'blocked') { logout(); return; }
            
            document.getElementById('user-name').innerText = currentUser.name;
            document.getElementById('user-role-display').innerText = currentUser.role === 'admin' ? 'مدير المنصة' : 'طالب';
            document.getElementById('watermark-protected').innerText = `${currentUser.name} | ${userPhone}`;
            
            if (currentUser.role === 'admin') document.getElementById('admin-panel').classList.remove('hidden');
            loadPackages();
        });

        // 2. Load Packages
        function loadPackages() {
            document.getElementById('back-to-pkgs').classList.add('hidden');
            document.getElementById('view-title').innerText = "الباقات المتاحة";
            const grid = document.getElementById('dynamic-grid');
            grid.innerHTML = '<p class="col-span-full text-center gold-text">جاري التحميل...</p>';

            db.ref('packages').once('value', (snap) => {
                grid.innerHTML = '';
                if (!snap.exists()) { grid.innerHTML = '<p class="col-span-full text-center">لا توجد باقات.</p>'; return; }
                
                snap.forEach((child) => {
                    const pkg = child.val();
                    const div = document.createElement('div');
                    div.className = "glass p-8 rounded-3xl border border-white/5 hover:border-gold-text transition-all cursor-pointer group";
                    div.innerHTML = `
                        <h3 class="text-2xl font-black mb-3 italic">${pkg.name}</h3>
                        <p class="text-gray-500 text-sm mb-6">${pkg.desc}</p>
                        <div class="flex justify-between items-center border-t border-white/10 pt-4">
                            <span class="gold-text font-black">250 ج.م</span>
                            <span class="text-xs opacity-50 italic">اضغط للعرض</span>
                        </div>
                    `;
                    div.onclick = () => loadLectures(child.key, pkg.name);
                    grid.appendChild(div);
                });
            });
        }

        // 3. Load Lectures & Show "Exam" Button
        function loadLectures(pkgId, pkgName) {
            document.getElementById('back-to-pkgs').classList.remove('hidden');
            document.getElementById('view-title').innerText = pkgName;
            const grid = document.getElementById('dynamic-grid');
            grid.innerHTML = '';

            db.ref(`lectures/${pkgId}`).once('value', (snap) => {
                if (!snap.exists()) { grid.innerHTML = '<p class="col-span-full text-center">لا توجد محاضرات هنا.</p>'; return; }
                
                snap.forEach((child) => {
                    const lec = child.val();
                    const div = document.createElement('div');
                    div.className = "glass p-5 rounded-2xl flex flex-col gap-4 border border-white/5";
                    div.innerHTML = `
                        <div class="flex items-center gap-4 cursor-pointer" onclick="startLearning('${lec.url}', '${lec.name}')">
                            <div class="w-12 h-12 gold-bg rounded-lg flex items-center justify-center text-black font-black">LEC</div>
                            <div class="flex-1">
                                <h4 class="font-bold">${lec.name}</h4>
                                <p class="text-[10px] text-gray-500 uppercase">اضغط للمشاهدة</p>
                            </div>
                        </div>
                        <button onclick="window.location.href='exams.html'" class="w-full bg-white/5 border border-gold-text/30 text-gold-text py-2 rounded-xl text-xs font-bold hover:bg-gold-text hover:text-black transition">
                            <i class="fas fa-edit ml-2"></i> دخول الامتحان الخاص بالمحاضرة
                        </button>
                    `;
                    grid.appendChild(div);
                });
            });
        }

        // 4. Video System
        function startLearning(url, title) {
            if (!url) return alert("الرابط غير صالح");
            const player = document.getElementById('player-view');
            const video = document.getElementById('video-engine');
            document.getElementById('playing-title').innerText = title;
            player.classList.remove('hidden');

            if (Hls.isSupported() && url.includes('.m3u8')) {
                const hls = new Hls(); hls.loadSource(url); hls.attachMedia(video);
            } else { video.src = url; }
            video.play();

            db.ref(`admin/watch_logs/${userPhone}`).push({
                name: currentUser.name, video: title, time: new Date().toLocaleString()
            });

            moveWatermark();
            window.wmInt = setInterval(moveWatermark, 5000);
        }

        function moveWatermark() {
            const wm = document.getElementById('watermark-protected');
            const box = wm.parentElement;
            wm.style.left = Math.random() * (box.clientWidth - 150) + 'px';
            wm.style.top = Math.random() * (box.clientHeight - 50) + 'px';
        }

        function closeVideo() {
            const video = document.getElementById('video-engine');
            video.pause(); video.src = "";
            document.getElementById('player-view').classList.add('hidden');
            clearInterval(window.wmInt);
        }

        // 5. Admin Logic
        function savePackage() {
            const name = document.getElementById('pkg-name').value;
            const desc = document.getElementById('pkg-desc').value;
            if (!name) return;
            db.ref('packages').push({ name, desc, price: 250 }).then(() => {
                toggleModal('package-modal'); loadPackages();
            });
        }

        function openLectureModal() {
            const select = document.getElementById('target-pkg');
            select.innerHTML = '';
            db.ref('packages').once('value', snap => {
                snap.forEach(c => { select.innerHTML += `<option value="${c.key}">${c.val().name}</option>`; });
                toggleModal('lecture-modal');
            });
        }

        function saveLecture() {
            const pkgId = document.getElementById('target-pkg').value;
            const name = document.getElementById('lec-name').value;
            const url = document.getElementById('lec-url').value;
            if (!name || !url) return alert("اكمل البيانات");
            
            db.ref(`lectures/${pkgId}`).push({ name, url }).then(() => {
                alert("تمت الإضافة!"); toggleModal('lecture-modal');
            });
        }

        function toggleModal(id) { document.getElementById(id).classList.toggle('hidden'); }
        function logout() { localStorage.clear(); window.location.href = 'go.html'; }

        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
