<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الأستاذ أحمد شعبان | الإصدار النهائي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #050505; color: #e2e8f0; user-select: none; overflow-x: hidden; }
        .glass { background: rgba(15, 15, 15, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(212, 175, 55, 0.1); }
        .gold-text { color: #d4af37; }
        .gold-bg { background: #d4af37; }
        
        #watermark-protected {
            position: absolute; z-index: 100; pointer-events: none;
            color: rgba(255, 255, 255, 0.3); font-size: 16px; font-weight: 900;
            white-space: nowrap; text-shadow: 1px 1px 2px #000; transition: all 0.8s ease-in-out;
        }

        #custom-player-container {
            position: relative; width: 100%; max-width: 850px; aspect-ratio: 16/9;
            background: #000; border-radius: 20px; overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        video::-webkit-media-controls-fullscreen-button, 
        video::-webkit-media-controls-picture-in-picture-button { display: none !important; }

        .toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-150%);
            padding: 12px 25px; border-radius: 12px; background: #111; border: 1px solid #d4af37;
            color: white; z-index: 10000; transition: 0.5s; font-weight: bold;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body class="min-h-screen flex flex-col" oncontextmenu="return false;">

    <nav class="glass sticky top-0 z-[100] p-4 flex justify-between items-center border-b border-white/5">
        <div class="flex items-center gap-4">
            <h1 class="text-xl font-black gold-text italic">أحمد شعبان</h1>
            <div class="hidden md:flex text-xs bg-white/5 p-2 rounded-lg gap-3">
                <span id="user-name">...</span>
                <span class="gold-text italic">المحفظة: <span id="user-wallet">0</span> ج.م</span>
            </div>
        </div>
        <button onclick="logout()" class="text-red-500 text-xs font-bold bg-red-500/10 px-4 py-2 rounded-lg hover:bg-red-500 hover:text-white transition">خروج</button>
    </nav>

    <div id="admin-panel" class="hidden m-4 p-6 glass rounded-2xl border-gold-text/20">
        <div class="flex flex-wrap gap-4 items-center mb-6">
            <h3 class="gold-text font-black ml-4">لوحة الإدارة:</h3>
            <button onclick="openPkgModal()" class="bg-gold-text text-black px-4 py-2 rounded-lg font-bold text-xs">باقة جديدة +</button>
            <button onclick="openLecModal()" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold text-xs">محاضرة جديدة +</button>
            <button onclick="showRequests()" class="bg-purple-600 text-white px-4 py-2 rounded-lg font-bold text-xs">طلبات الاشتراك</button>
            <button onclick="toggleLogs()" class="bg-white/10 px-4 py-2 rounded-lg font-bold text-xs">سجل المشاهدة</button>
        </div>
        <div id="admin-content-area" class="hidden mt-4 max-h-60 overflow-y-auto bg-black/40 rounded-xl p-4"></div>
    </div>

    <main class="flex-1 p-6">
        <div class="max-w-6xl mx-auto">
            <div class="flex justify-between items-center mb-10">
                <div id="view-header">
                    <h2 id="view-title" class="text-3xl font-black italic">الدورات التدريبية</h2>
                    <p id="view-desc" class="text-gray-500 text-sm mt-1">اختر الباقة المناسبة لبدء التعلم</p>
                </div>
                <button id="back-btn" class="hidden bg-white/5 hover:bg-gold-text hover:text-black px-6 py-2 rounded-xl gold-text font-bold transition" onclick="loadPackages()">العودة <i class="fas fa-arrow-left mr-2"></i></button>
            </div>
            <div id="dynamic-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
        </div>
    </main>

    <section id="player-view" class="hidden fixed inset-0 z-[500] bg-black/98 flex flex-col items-center justify-center p-4">
        <div id="custom-player-container">
            <div id="watermark-protected"></div>
            <video id="video-engine" class="w-full h-full" controls disablePictureInPicture controlsList="nodownload nofullscreen"></video>
            <button onclick="closeVideo()" class="absolute top-4 left-4 bg-red-600 text-white w-10 h-10 rounded-full flex items-center justify-center shadow-lg z-[600]"><i class="fas fa-times"></i></button>
        </div>
        <div class="mt-6 text-center">
            <h3 id="playing-title" class="text-xl gold-text font-black"></h3>
            <p id="playing-desc" class="text-gray-400 text-sm mt-2 max-w-md"></p>
        </div>
    </section>

    <div id="pkg-modal" class="hidden fixed inset-0 z-[1000] bg-black/95 flex items-center justify-center p-4">
        <div class="glass w-full max-w-lg p-8 rounded-3xl border border-gold-text/30">
            <h3 class="gold-text font-black text-xl mb-6">إعداد الباقة</h3>
            <input id="p-name" type="text" placeholder="اسم الباقة" class="w-full bg-white/5 p-4 rounded-xl mb-3 outline-none border border-white/10">
            <textarea id="p-desc" placeholder="وصف الباقة..." class="w-full bg-white/5 p-4 rounded-xl mb-3 h-24 outline-none border border-white/10"></textarea>
            <input id="p-price" type="number" placeholder="السعر (ج.م)" class="w-full bg-white/5 p-4 rounded-xl mb-6 outline-none border border-white/10">
            <button id="pkg-save-btn" onclick="savePackage()" class="w-full gold-bg text-black font-black p-4 rounded-xl text-lg">حفظ الباقة</button>
            <button onclick="toggleModal('pkg-modal')" class="w-full mt-4 text-gray-500">إلغاء</button>
        </div>
    </div>

    <div id="lec-modal" class="hidden fixed inset-0 z-[1000] bg-black/95 flex items-center justify-center p-4">
        <div class="glass w-full max-w-lg p-8 rounded-3xl border border-blue-500/30">
            <h3 class="text-blue-500 font-black text-xl mb-6">إعداد المحاضرة والامتحان</h3>
            <select id="l-target" class="w-full bg-black border border-white/10 p-4 rounded-xl mb-3 text-white"></select>
            <input id="l-name" type="text" placeholder="عنوان المحاضرة" class="w-full bg-white/5 p-4 rounded-xl mb-3 outline-none border border-white/10">
            <textarea id="l-desc" placeholder="وصف المحاضرة..." class="w-full bg-white/5 p-4 rounded-xl mb-3 h-24 outline-none border border-white/10"></textarea>
            <input id="l-url" type="text" placeholder="رابط الفيديو" class="w-full bg-white/5 p-4 rounded-xl mb-3 outline-none border border-white/10">
            <input id="l-quiz" type="text" placeholder="رابط الامتحان (اختياري)" class="w-full bg-white/5 p-4 rounded-xl mb-6 outline-none border border-white/10">
            <button id="lec-save-btn" onclick="saveLecture()" class="w-full bg-blue-600 text-white font-black p-4 rounded-xl text-lg">حفظ المحاضرة</button>
            <button onclick="toggleModal('lec-modal')" class="w-full mt-4 text-gray-500">إلغاء</button>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBfkxj5I7UOEETOf9GRqGgqEaEoqPtPMek",
            authDomain: "mrahmed-925d8.firebaseapp.com",
            databaseURL: "https://mrahmed-925d8-default-rtdb.firebaseio.com",
            projectId: "mrahmed-925d8",
            storageBucket: "mrahmed-925d8.firebasestorage.app",
            messagingSenderId: "83939909031",
            appId: "1:83939909031:web:adb0b10d41b9df6c602a82"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const userPhone = localStorage.getItem('userLoggedIn');
        let currentUser = null;
        let editingPkgId = null;
        let editingLecId = null;

        // Core Real-time Sync
        db.ref('students/' + userPhone).on('value', (snap) => {
            currentUser = snap.val();
            if (!currentUser) { location.href = 'go.html'; return; }
            document.getElementById('user-name').innerText = currentUser.name;
            document.getElementById('user-wallet').innerText = currentUser.balance || 0;
            if (currentUser.role === 'admin') document.getElementById('admin-panel').classList.remove('hidden');
            
            // تحديث الواجهة فقط إذا كنا في عرض الباقات
            if (document.getElementById('back-btn').classList.contains('hidden')) {
                loadPackages();
            }
        });

        function loadPackages() {
            document.getElementById('back-btn').classList.add('hidden');
            document.getElementById('view-title').innerText = "الدورات التدريبية";
            document.getElementById('view-desc').innerText = "اختر الباقة المناسبة لبدء التعلم";
            const grid = document.getElementById('dynamic-grid'); 
            
            db.ref('packages').once('value', s => {
                grid.innerHTML = '';
                s.forEach(child => {
                    const p = child.val();
                    const status = currentUser.courses ? currentUser.courses[child.key] : null;
                    const isAdmin = currentUser.role === 'admin';
                    
                    let actionBtn = '';
                    if (isAdmin || status === true) {
                        actionBtn = `<button onclick="loadLectures('${child.key}', '${p.name.replace(/'/g, "\\'")}', '${p.desc ? p.desc.replace(/'/g, "\\'") : ""}')" class="bg-white/10 px-6 py-2 rounded-xl text-xs font-black">دخول</button>`;
                    } else if (status === 'pending') {
                        actionBtn = `<button class="bg-yellow-600/20 text-yellow-500 px-6 py-2 rounded-xl text-xs font-black cursor-not-allowed">قيد المراجعة</button>`;
                    } else {
                        actionBtn = `<button onclick="requestSub('${child.key}', ${p.price})" class="gold-bg text-black px-6 py-2 rounded-xl text-xs font-black">شراء</button>`;
                    }

                    grid.innerHTML += `
                        <div class="glass p-6 rounded-3xl border border-white/5 flex flex-col h-full">
                            <div class="flex justify-between items-start mb-4">
                                <h3 class="text-xl font-bold italic gold-text">${p.name}</h3>
                                ${isAdmin ? `
                                    <div class="flex gap-2">
                                        <button onclick="editPkg('${child.key}', '${p.name}', '${p.desc || ''}', ${p.price})" class="text-blue-400 p-1"><i class="fas fa-edit"></i></button>
                                        <button onclick="deletePkg('${child.key}')" class="text-red-500 p-1"><i class="fas fa-trash"></i></button>
                                    </div>` : ''}
                            </div>
                            <p class="text-gray-400 text-xs mb-6 flex-1">${p.desc || ''}</p>
                            <div class="flex justify-between items-center border-t border-white/5 pt-4">
                                <span class="font-black text-sm">${p.price} ج.م</span>
                                ${actionBtn}
                            </div>
                        </div>`;
                });
            });
        }

        async function requestSub(id, price) {
            const balance = currentUser.balance || 0;
            if (balance < price) return showToast("رصيدك غير كافٍ");
            if (confirm("سيتم خصم المبلغ وإرسال طلب اشتراك؟")) {
                await db.ref(`students/${userPhone}`).update({ balance: balance - price });
                await db.ref(`students/${userPhone}/courses/${id}`).set('pending');
                await db.ref(`admin/requests`).push({
                    studentName: currentUser.name, phone: userPhone,
                    pkgId: id, time: new Date().toLocaleString()
                });
                showToast("تم إرسال طلبك بنجاح");
            }
        }

        function loadLectures(pkgId, pkgName, pkgDesc) {
            document.getElementById('back-btn').classList.remove('hidden');
            document.getElementById('view-title').innerText = pkgName;
            document.getElementById('view-desc').innerText = pkgDesc;
            const grid = document.getElementById('dynamic-grid'); 

            db.ref(`lectures/${pkgId}`).once('value', s => {
                grid.innerHTML = '';
                if(!s.exists()) { grid.innerHTML = '<p class="col-span-full text-center text-gray-500">لا توجد محاضرات في هذه الباقة بعد.</p>'; return; }
                
                s.forEach(c => {
                    const l = c.val();
                    const isAdmin = currentUser.role === 'admin';
                    grid.innerHTML += `
                        <div class="glass p-5 rounded-2xl">
                            <div class="flex justify-between mb-4">
                                <h4 class="font-bold text-sm gold-text">${l.name}</h4>
                                ${isAdmin ? `
                                    <div class="flex gap-2">
                                        <button onclick="editLec('${pkgId}', '${c.key}', '${l.name}', '${l.desc || ''}', '${l.url}', '${l.quiz || ''}')" class="text-blue-400"><i class="fas fa-edit"></i></button>
                                        <button onclick="deleteLec('${pkgId}', '${c.key}')" class="text-red-500"><i class="fas fa-trash"></i></button>
                                    </div>` : ''}
                            </div>
                            <p class="text-gray-500 text-[10px] mb-4 h-8 overflow-hidden">${l.desc || ''}</p>
                            <div class="flex flex-col gap-2">
                                <button onclick="startVideo('${l.url}', '${l.name.replace(/'/g, "\\'")}', '${l.desc ? l.desc.replace(/'/g, "\\'") : ""}')" class="w-full bg-white/5 hover:bg-gold-text hover:text-black py-2 rounded-xl text-[10px] font-black transition">مشاهدة المحاضرة</button>
                                ${l.quiz ? `<a href="${l.quiz}" target="_blank" class="w-full bg-blue-600/20 text-blue-400 text-center py-2 rounded-xl text-[10px] font-black border border-blue-600/30">دخول الامتحان</a>` : ''}
                            </div>
                        </div>`;
                });
            });
        }

        // Video Controller
        function startVideo(url, title, desc) {
            const player = document.getElementById('player-view');
            const video = document.getElementById('video-engine');
            document.getElementById('playing-title').innerText = title;
            document.getElementById('playing-desc').innerText = desc;
            player.classList.remove('hidden');
            
            if (Hls.isSupported() && url.includes('.m3u8')) {
                const hls = new Hls(); hls.loadSource(url); hls.attachMedia(video);
            } else { video.src = url; }
            
            video.play();
            db.ref('admin/logs').push({ student: currentUser.name, video: title, time: new Date().toLocaleString() });
            moveWM();
            window.wmInt = setInterval(moveWM, 4000);
        }

        function moveWM() {
            const wm = document.getElementById('watermark-protected');
            const cont = document.getElementById('custom-player-container');
            if(!wm || !cont) return;
            wm.innerText = `${userPhone} - ${currentUser.name}`;
            wm.style.left = Math.random() * (cont.clientWidth - 150) + 'px';
            wm.style.top = Math.random() * (cont.clientHeight - 40) + 'px';
        }

        function closeVideo() {
            const v = document.getElementById('video-engine'); v.pause(); v.src = "";
            document.getElementById('player-view').classList.add('hidden');
            clearInterval(window.wmInt);
        }

        // Admin Management
        function editPkg(id, name, desc, price) {
            editingPkgId = id;
            document.getElementById('p-name').value = name;
            document.getElementById('p-desc').value = desc;
            document.getElementById('p-price').value = price;
            toggleModal('pkg-modal');
        }

        function savePackage() {
            const data = {
                name: document.getElementById('p-name').value,
                desc: document.getElementById('p-desc').value,
                price: Number(document.getElementById('p-price').value)
            };
            const ref = editingPkgId ? db.ref(`packages/${editingPkgId}`) : db.ref('packages').push();
            ref.set(data).then(() => { editingPkgId = null; toggleModal('pkg-modal'); loadPackages(); });
        }

        function deletePkg(id) {
            if(confirm("هل أنت متأكد من حذف الباقة وجميع محاضراتها؟")) {
                db.ref(`packages/${id}`).remove();
                db.ref(`lectures/${id}`).remove();
                loadPackages();
            }
        }

        function editLec(pkgId, lecId, name, desc, url, quiz) {
            editingLecId = { pkgId, lecId };
            const s = document.getElementById('l-target');
            s.innerHTML = `<option value="${pkgId}">نفس الباقة</option>`;
            document.getElementById('l-name').value = name;
            document.getElementById('l-desc').value = desc;
            document.getElementById('l-url').value = url;
            document.getElementById('l-quiz').value = quiz;
            toggleModal('lec-modal');
        }

        function saveLecture() {
            const pkgId = document.getElementById('l-target').value;
            const data = {
                name: document.getElementById('l-name').value,
                desc: document.getElementById('l-desc').value,
                url: document.getElementById('l-url').value,
                quiz: document.getElementById('l-quiz').value
            };
            const ref = (editingLecId && editingLecId.lecId) ? db.ref(`lectures/${editingLecId.pkgId}/${editingLecId.lecId}`) : db.ref(`lectures/${pkgId}`).push();
            ref.set(data).then(() => { 
                const oldPkgId = editingLecId ? editingLecId.pkgId : pkgId;
                editingLecId = null; 
                toggleModal('lec-modal'); 
                showToast("تم الحفظ!");
                loadLectures(oldPkgId, document.getElementById('view-title').innerText, document.getElementById('view-desc').innerText);
            });
        }

        function deleteLec(pkgId, lecId) {
            if(confirm("حذف هذه المحاضرة؟")) {
                db.ref(`lectures/${pkgId}/${lecId}`).remove();
                loadLectures(pkgId, document.getElementById('view-title').innerText, document.getElementById('view-desc').innerText);
            }
        }

        function showRequests() {
            const area = document.getElementById('admin-content-area'); area.classList.toggle('hidden');
            area.innerHTML = '<h4 class="text-xs gold-text mb-4 font-bold underline">طلبات الاشتراك:</h4>';
            db.ref('admin/requests').once('value', s => {
                s.forEach(c => {
                    const r = c.val();
                    area.innerHTML += `<div class="flex justify-between items-center bg-white/5 p-2 rounded mb-1 text-[10px]">
                        <span>${r.studentName} - ${r.time}</span>
                        <button onclick="approve('${r.phone}', '${r.pkgId}', '${c.key}')" class="bg-green-600 px-2 py-1 rounded">قبول</button>
                    </div>`;
                });
            });
        }

        async function approve(phone, pkgId, reqKey) {
            await db.ref(`students/${phone}/courses/${pkgId}`).set(true);
            await db.ref(`admin/requests/${reqKey}`).remove();
            showRequests(); showToast("تم التفعيل!");
        }

        function toggleLogs() {
            const area = document.getElementById('admin-content-area'); area.classList.toggle('hidden');
            area.innerHTML = '<h4 class="text-xs text-blue-400 mb-4 font-bold underline">آخر النشاطات:</h4>';
            db.ref('admin/logs').limitToLast(15).once('value', s => {
                s.forEach(c => {
                    const l = c.val();
                    area.innerHTML += `<div class="text-[9px] border-b border-white/5 py-1 text-gray-400">${l.student} شاهد ${l.video} @ ${l.time}</div>`;
                });
            });
        }

        function openPkgModal() { editingPkgId = null; document.getElementById('p-name').value = ''; document.getElementById('p-desc').value = ''; document.getElementById('p-price').value = ''; toggleModal('pkg-modal'); }
        
        function openLecModal() {
            editingLecId = null;
            const s = document.getElementById('l-target'); s.innerHTML = '';
            document.getElementById('l-name').value = '';
            document.getElementById('l-desc').value = '';
            document.getElementById('l-url').value = '';
            document.getElementById('l-quiz').value = '';
            db.ref('packages').once('value', snap => {
                snap.forEach(p => s.innerHTML += `<option value="${p.key}">${p.val().name}</option>`);
                toggleModal('lec-modal');
            });
        }

        function showToast(m) {
            const t = document.getElementById('toast'); t.innerText = m;
            t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000);
        }
        function toggleModal(id) { document.getElementById(id).classList.toggle('hidden'); }
        function logout() { localStorage.removeItem('userLoggedIn'); location.href='go.html'; }
    </script>
</body>
</html>
