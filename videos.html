<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة مستر احمد شعبان - النظام الذكي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#0f172a',
                        darker: '#020617',
                        neonRed: '#ef4444',
                    }
                }
            }
        }
    </script>
    <style>
        body { -webkit-user-select: none; user-select: none; scrollbar-gutter: stable; background-color: #020617; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #ef4444; border-radius: 10px; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); }
        .animate-fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="text-gray-200 font-sans h-screen flex flex-col overflow-hidden">

    <nav class="glass border-b border-gray-800 p-4 flex justify-between items-center z-20">
        <div class="flex items-center gap-3">
            <div class="bg-neonRed p-2 rounded-lg shadow-lg shadow-neonRed/20">
                <i class="fa-solid fa-graduation-cap text-darker text-xl"></i>
            </div>
            <h1 class="text-xl font-bold">منصة <span class="text-neonRed">أحمد شعبان</span></h1>
        </div>
        <div class="flex items-center gap-4">
            <div class="text-left">
                <p id="user-display-role" class="text-[10px] text-gray-500 uppercase tracking-widest">جاري الفحص...</p>
                <p id="user-display-name" class="text-sm font-bold text-white">...</p>
            </div>
            <div id="status-dot" class="w-2.5 h-2.5 rounded-full bg-gray-600"></div>
        </div>
    </nav>

    <main class="flex-1 overflow-y-auto p-4 lg:p-8">
        <div class="max-w-6xl mx-auto">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h2 class="text-2xl font-bold text-white">المحتوى الدراسي</h2>
                    <p class="text-sm text-gray-500 mt-1">أهلاً بك مجدداً، استكمل دروسك الآن</p>
                </div>
                <div class="flex gap-2">
                    <button id="admin-add-btn" class="hidden bg-white text-darker px-5 py-2 rounded-xl font-bold hover:bg-neonRed hover:text-white transition-all">
                        <i class="fa-solid fa-plus ml-1"></i> إدارة المحتوى
                    </button>
                    <button id="logout-btn" class="bg-gray-800 text-gray-400 px-4 py-2 rounded-xl text-xs hover:bg-red-600 hover:text-white transition-all">
                        <i class="fa-solid fa-right-from-bracket"></i>
                    </button>
                </div>
            </div>

            <div id="dynamic-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 animate-fade-in">
                <div class="col-span-full text-center py-20">
                    <i class="fa-solid fa-circle-notch animate-spin text-3xl text-neonRed"></i>
                    <p class="mt-4 text-gray-500">جاري تحميل بياناتك الحقيقية...</p>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // إعدادات Firebase الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyBfkxj5I7UOEETOf9GRqGgqEaEoqPtPMek",
            authDomain: "mrahmed-925d8.firebaseapp.com",
            databaseURL: "https://mrahmed-925d8-default-rtdb.firebaseio.com",
            projectId: "mrahmed-925d8",
            storageBucket: "mrahmed-925d8.firebasestorage.app",
            messagingSenderId: "83939909031",
            appId: "1:83939909031:web:adb0b10d41b9df6c602a82"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 1. منطق الفحص والتحويل
        function authenticate() {
            // نحاول جلب البيانات من المفتاحين الأكثر شيوعاً (user أو mrahmed_user)
            const localData = localStorage.getItem('mrahmed_user') || localStorage.getItem('user');
            
            if (!localData) {
                // المستخدم لم يسجل دخول مطلقاً -> اذهب لصفحة التسجيل
                window.location.href = 'go.html';
                return;
            }

            try {
                const parsedUser = JSON.parse(localData);
                const userId = parsedUser.userId || parsedUser.id || parsedParsed.phone;

                if (!userId) throw new Error("No ID found");

                // 2. التحقق من الهوية الحقيقية من السيرفر
                onValue(ref(db, `users/${userId}`), (snapshot) => {
                    const cloudData = snapshot.val();
                    
                    if (cloudData) {
                        // البيانات موجودة وصحيحة
                        renderUI(cloudData);
                    } else {
                        // مسجل في المتصفح لكن ليس له وجود في السيرفر (بيانات قديمة أو وهمية)
                        localStorage.removeItem('mrahmed_user');
                        window.location.href = 'go.html';
                    }
                }, { onlyOnce: true });

            } catch (e) {
                window.location.href = 'go.html';
            }
        }

        // 3. عرض الواجهة بناءً على البيانات الحقيقية
        function renderUI(user) {
            document.getElementById('user-display-name').textContent = user.name;
            document.getElementById('user-display-role').textContent = user.role === 'admin' ? 'إدارة المنصة' : 'حساب طالب';
            document.getElementById('status-dot').classList.replace('bg-gray-600', 'bg-green-500');

            if (user.role === 'admin') {
                document.getElementById('admin-add-btn').classList.remove('hidden');
            }

            if (user.status === 'blocked') {
                document.body.innerHTML = "<div class='h-screen flex items-center justify-center text-white'><h1>عذراً، تم حظر دخولك للمنصة</h1></div>";
                return;
            }

            loadContent();
        }

        // 4. جلب الباقات المتاحة
        function loadContent() {
            onValue(ref(db, 'packages/'), (snapshot) => {
                const container = document.getElementById('dynamic-container');
                container.innerHTML = '';
                const pkgs = snapshot.val();

                if (!pkgs) {
                    container.innerHTML = "<p class='col-span-full text-center text-gray-600'>لا يوجد محتوى متاح حالياً.</p>";
                    return;
                }

                Object.keys(pkgs).forEach(id => {
                    const pkg = pkgs[id];
                    const card = document.createElement('div');
                    card.className = "bg-dark p-6 rounded-2xl border border-gray-800 hover:border-neonRed transition-all cursor-pointer group";
                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-4">
                            <div class="bg-gray-800 p-3 rounded-xl group-hover:bg-neonRed transition-colors">
                                <i class="fa-solid fa-book-open"></i>
                            </div>
                            <span class="text-[10px] bg-green-500/10 text-green-500 px-2 py-1 rounded">نشط</span>
                        </div>
                        <h3 class="text-lg font-bold text-white">${pkg.name}</h3>
                        <p class="text-gray-500 text-xs mt-2 line-clamp-2">${pkg.desc || 'لا يوجد وصف'}</p>
                        <div class="mt-6 flex justify-between items-center border-t border-gray-800 pt-4">
                            <span class="text-neonRed font-bold text-sm">دخول الباقة</span>
                            <i class="fa-solid fa-chevron-left text-[10px]"></i>
                        </div>
                    `;
                    container.appendChild(card);
                });
            });
        }

        // تسجيل الخروج
        document.getElementById('logout-btn').onclick = () => {
            if(confirm("هل تريد تسجيل الخروج؟")) {
                localStorage.removeItem('mrahmed_user');
                localStorage.removeItem('user');
                window.location.href = 'go.html';
            }
        };

        // تشغيل الفحص عند التحميل
        authenticate();

        // حماية إضافية
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
