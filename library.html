<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة الأستاذ أحمد شعبان</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #d4af37; --bg: #0a0a0a; --card-bg: rgba(255, 255, 255, 0.05); }
        body { background: var(--bg); color: #fff; font-family: 'Cairo', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: 40px auto; text-align: center; }
        
        /* واجهة رصيد المحفظة */
        .wallet-bar {
            background: #151515; padding: 12px 20px; border-radius: 15px;
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 25px; border: 1px solid #222;
        }
        .wallet-amount { color: var(--primary); font-weight: bold; font-size: 1.1rem; }

        /* لوحة التحكم للأدمن */
        .admin-zone { 
            background: #151515; padding: 20px; border-radius: 20px; 
            border: 1px dashed var(--primary); display: none; margin-bottom: 30px;
        }
        input { 
            width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; 
            border: 1px solid #333; background: #000; color: #fff; box-sizing: border-box;
            font-family: 'Cairo';
        }
        .btn-post { 
            width: 100%; padding: 12px; background: var(--primary); border: none; 
            border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px;
            transition: 0.3s;
        }
        .btn-post:hover { opacity: 0.8; }

        /* كارت عرض المذكرة */
        .memo-card {
            background: var(--card-bg); border: 1px solid #222; padding: 40px 20px;
            border-radius: 30px; display: none; position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .memo-title { font-size: 1.6rem; color: var(--primary); font-weight: 900; margin-bottom: 5px; }
        .memo-subtitle { opacity: 0.6; font-size: 0.8rem; margin-bottom: 25px; }
        
        .display-btn {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            background: var(--primary); color: #000; text-decoration: none;
            padding: 15px; border-radius: 15px; font-weight: 900; transition: 0.3s;
        }
        .display-btn:hover { transform: scale(1.03); }
        
        .del-btn { color: #ff4d4d; font-size: 0.8rem; cursor: pointer; margin-top: 20px; display: inline-block; }
    </style>
</head>
<body>

<div class="container">
    <div class="wallet-bar">
        <span><i class="fas fa-wallet" style="margin-left: 8px;"></i>رصيد محفظتك:</span>
        <span class="wallet-amount" id="wallet-balance">0 جنيه</span>
    </div>

    <h1 style="color: var(--primary); margin-bottom: 30px;">المكتبة الرقمية</h1>

    <div class="admin-zone" id="admin-zone">
        <p style="margin-top:0; color: var(--primary);">إدارة المذكرات</p>
        <input type="text" id="inp-title" placeholder="عنوان المذكرة (مثال: فلسفة 1ث)">
        <input type="text" id="inp-url" placeholder="رابط Google Drive">
        <button class="btn-post" onclick="saveMemo()">تحديث المذكرة الآن</button>
    </div>

    <div id="memo-box">
        <div class="memo-card" id="memo-card">
            <div class="memo-title" id="title-text"></div>
            <div class="memo-subtitle">الأستاذ أحمد شعبان - فلسفة ومنطق</div>
            <a href="#" id="file-link" class="display-btn" target="_blank">
                <i class="fas fa-eye"></i> عرض المذكرة (Preview)
            </a>
            <span class="del-btn" id="del-btn" onclick="deleteMemo()" style="display:none;">حذف المذكرة</span>
        </div>
        <p id="empty-msg" style="opacity: 0.4;">جاري البحث عن مذكرات...</p>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBfkxj5I7UOEETOf9GRqGgqEaEoqPtPMek",
        authDomain: "mrahmed-925d8.firebaseapp.com",
        databaseURL: "https://mrahmed-925d8-default-rtdb.firebaseio.com",
        projectId: "mrahmed-925d8",
        storageBucket: "mrahmed-925d8.firebasestorage.app",
        messagingSenderId: "83939909031",
        appId: "1:83939909031:web:adb0b10d41b9df6c602a82"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const userPhone = localStorage.getItem('userLoggedIn');

    // 1. جلب الرصيد من حقل balance في الفيربيز
    if (userPhone) {
        // الربط المباشر مع المسار الموضح في الصورة
        db.ref(userPhone).on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                // استخدام اسم الحقل 'balance' كما ظهر في الصورة
                const currentBalance = data.balance || 0;
                document.getElementById('wallet-balance').innerText = currentBalance + " جنيه";

                // التأكد من صلاحية الأدمن
                if (userPhone === "01025768529") {
                    document.getElementById('admin-zone').style.display = 'block';
                }
            }
        });
    }

    // 2. إدارة المذكرات
    function saveMemo() {
        const t = document.getElementById('inp-title').value;
        const u = document.getElementById('inp-url').value;
        if(t && u) {
            db.ref('activeMemo').set({ title: t, url: u }).then(() => {
                alert("تم التحديث!");
                document.getElementById('inp-title').value = "";
                document.getElementById('inp-url').value = "";
            });
        }
    }

    db.ref('activeMemo').on('value', (s) => {
        const d = s.val();
        const card = document.getElementById('memo-card');
        const msg = document.getElementById('empty-msg');
        
        if(d && d.title) {
            msg.style.display = 'none';
            card.style.display = 'block';
            document.getElementById('title-text').innerText = d.title;

            let finalUrl = d.url;
            if (finalUrl.includes('drive.google.com')) {
                let fileId = (finalUrl.includes('/d/')) ? finalUrl.split('/d/')[1].split('/')[0] : finalUrl.split('id=')[1].split('&')[0];
                finalUrl = `https://drive.google.com/file/d/${fileId}/preview`;
            }
            document.getElementById('file-link').href = finalUrl;
            
            if(userPhone === "01025768529") document.getElementById('del-btn').style.display = 'inline-block';
        } else {
            card.style.display = 'none';
            msg.innerText = "لا توجد مذكرات متاحة حالياً";
            msg.style.display = 'block';
        }
    });

    function deleteMemo() {
        if(confirm("حذف المذكرة؟")) db.ref('activeMemo').remove();
    }
</script>
</body>
</html>
