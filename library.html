<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة الأستاذ أحمد شعبان | المذكرات الرقمية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #d4af37; --bg: #050505; --card-bg: rgba(255, 255, 255, 0.03); --gold: #d4af37; }
        body { background: var(--bg); color: #fff; font-family: 'Cairo', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: 40px auto; text-align: center; }
        
        /* شريط المحفظة بنفس ستايل المنصة */
        .wallet-box {
            background: rgba(212, 175, 55, 0.1); border: 1px solid var(--gold);
            padding: 10px 20px; border-radius: 15px; color: var(--gold);
            font-weight: 900; display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 25px; font-size: 1rem;
        }

        .admin-zone { 
            background: #111; padding: 20px; border-radius: 20px; 
            border: 1px dashed var(--primary); display: none; margin-bottom: 30px;
        }
        input { 
            width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; 
            border: 1px solid #333; background: #000; color: #fff; box-sizing: border-box;
        }
        .btn-post { 
            width: 100%; padding: 12px; background: var(--primary); border: none; 
            border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px;
        }

        .memo-card {
            background: var(--card-bg); border: 1px solid rgba(212, 175, 55, 0.1); padding: 40px 20px;
            border-radius: 30px; display: none; position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .memo-title { font-size: 1.8rem; color: var(--primary); font-weight: 900; margin-bottom: 5px; }
        
        .download-btn {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            background: var(--primary); color: #000; text-decoration: none;
            padding: 15px; border-radius: 15px; font-weight: 900; transition: 0.3s;
        }
        
        .del-btn { color: #ff4d4d; font-size: 0.8rem; cursor: pointer; margin-top: 20px; display: inline-block; }
    </style>
</head>
<body>

<div class="container">
    <div class="wallet-box">
        <span id="welcome-msg">تحميل...</span>
        <div>
            <i class="fas fa-coins"></i>
            <span id="user-balance">0</span> ج.م
        </div>
    </div>

    <h1 style="color: var(--primary); margin-bottom: 30px;">المكتبة الرقمية ⚜️</h1>

    <div class="admin-zone" id="admin-zone">
        <p style="margin-top:0;">إضافة مذكرة (Google Drive)</p>
        <input type="text" id="inp-title" placeholder="عنوان المذكرة">
        <input type="text" id="inp-url" placeholder="رابط الملف">
        <button class="btn-post" onclick="saveMemo()">تحديث المكتبة الآن</button>
    </div>

    <div id="memo-box">
        <div class="memo-card" id="memo-card">
            <div class="memo-title" id="title-text"></div>
            <div style="opacity: 0.6; margin-bottom: 25px;">نسخة PDF أصلية - الأستاذ أحمد شعبان</div>
            <a href="#" id="file-link" class="download-btn" target="_blank">
                <i class="fas fa-eye"></i> عرض المذكرة الآن
            </a>
            <span class="del-btn" id="del-btn" onclick="deleteMemo()" style="display:none;">حذف المذكرة</span>
        </div>
        <p id="empty-msg" style="opacity: 0.4;">لا توجد مذكرات متاحة حالياً</p>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBfkxj5I7UOEETOf9GRqGgqEaEoqPtPMek",
        authDomain: "mrahmed-925d8.firebaseapp.com",
        databaseURL: "https://mrahmed-925d8-default-rtdb.firebaseio.com",
        projectId: "mrahmed-925d8",
        storageBucket: "mrahmed-925d8.firebasestorage.app",
        messagingSenderId: "83939909031",
        appId: "1:83939909031:web:adb0b10d41b9df6c602a82"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // جلب البيانات من LocalStorage كما في المنصة
    const userPhone = localStorage.getItem('userLoggedIn');
    const userName = localStorage.getItem('userName');

    if (!userPhone) {
        window.location.href = "go.html"; // التوجيه لصفحة الدخول إذا لم يسجل
    } else {
        // الربط مع مسار الطلاب الصحيح 'students/'
        db.ref('students/' + userPhone).on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                // تحديث الاسم والرصيد
                document.getElementById('welcome-msg').innerText = "يا أهلاً، " + data.name.split(' ')[0];
                document.getElementById('user-balance').innerText = (data.balance || 0).toLocaleString();

                // التحقق من صلاحية الأدمن
                if (data.role === "admin" || userPhone === "01025768529") {
                    document.getElementById('admin-zone').style.display = 'block';
                }
            }
        });
    }

    function saveMemo() {
        const t = document.getElementById('inp-title').value;
        const u = document.getElementById('inp-url').value;
        if(t && u) {
            db.ref('activeMemo').set({ title: t, url: u }).then(() => {
                alert("تم التحديث!");
                document.getElementById('inp-title').value = "";
                document.getElementById('inp-url').value = "";
            });
        }
    }

    db.ref('activeMemo').on('value', (s) => {
        const d = s.val();
        if(d && d.title) {
            document.getElementById('empty-msg').style.display = 'none';
            document.getElementById('memo-card').style.display = 'block';
            document.getElementById('title-text').innerText = d.title;

            let finalUrl = d.url;
            if (finalUrl.includes('drive.google.com')) {
                let fileId = (finalUrl.includes('/d/')) ? finalUrl.split('/d/')[1].split('/')[0] : finalUrl.split('id=')[1].split('&')[0];
                finalUrl = `https://drive.google.com/file/d/${fileId}/preview`;
            }
            document.getElementById('file-link').href = finalUrl;
            
            // إظهار زر الحذف للأدمن فقط
            if (userPhone === "01025768529") document.getElementById('del-btn').style.display = 'inline-block';
        } else {
            document.getElementById('memo-card').style.display = 'none';
            document.getElementById('empty-msg').style.display = 'block';
        }
    });

    function deleteMemo() {
        if(confirm("حذف المذكرة؟")) db.ref('activeMemo').remove();
    }
</script>
</body>
</html>
