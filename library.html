<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المكتبة الرقمية | الأستاذ أحمد شعبان</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #d4af37;
            --gold: #d4af37;
            --card-bg: #1a1a1a;
        }
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        .wallet-box {
            background: rgba(212, 175, 55, 0.1); 
            border: 1px solid var(--gold);
            padding: 10px 20px; 
            border-radius: 15px; 
            color: var(--gold);
            font-weight: 900; 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            margin-bottom: 25px; 
            font-size: 1rem;
        }

        .admin-zone { 
            background: #111; 
            padding: 20px; 
            border-radius: 20px; 
            border: 1px dashed var(--primary); 
            display: none; 
            margin-bottom: 30px;
        }
        input { 
            width: 100%; 
            padding: 12px; 
            margin: 8px 0; 
            border-radius: 10px; 
            border: 1px solid #333; 
            background: #000; 
            color: #fff; 
            box-sizing: border-box; 
            font-family: 'Cairo';
        }
        .btn-post { 
            width: 100%; 
            padding: 12px; 
            background: var(--primary); 
            border: none; 
            border-radius: 10px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 10px;
        }

        /* تعديل كلاس الكارت لضمان الظهور */
        .memo-card {
            background: var(--card-bg); 
            border: 1px solid rgba(212, 175, 55, 0.1); 
            padding: 40px 20px;
            border-radius: 30px; 
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            margin-bottom: 20px;
            display: block !important; /* لضمان عدم الاختفاء */
        }
        .memo-title { font-size: 1.8rem; color: var(--primary); font-weight: 900; margin-bottom: 5px; }
        
        .action-btn {
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px;
            background: var(--primary); 
            color: #000; 
            text-decoration: none;
            padding: 15px; 
            border-radius: 15px; 
            font-weight: 900; 
            transition: 0.3s;
            cursor: pointer; 
            border: none; 
            width: 100%; 
            font-family: 'Cairo';
        }

        .viewer-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); z-index: 9999; display: none;
            flex-direction: column;
        }
        .viewer-header {
            padding: 15px; display: flex; justify-content: space-between; align-items: center;
            background: #111; border-bottom: 1px solid var(--gold);
        }
        iframe { width: 100%; height: 100%; border: none; }
        .close-viewer { color: #fff; font-size: 1.5rem; cursor: pointer; }
        
        .del-btn { 
            color: #ff4d4d; 
            font-size: 0.8rem; 
            cursor: pointer; 
            margin-top: 20px; 
            display: inline-block; 
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="wallet-box">
        <span id="welcome-msg">تحميل...</span>
        <div>
            <i class="fas fa-coins"></i>
            <span id="user-balance">0</span> ج.م
        </div>
    </div>

    <h1 style="color: var(--primary); margin-bottom: 10px;">المكتبة الرقمية ⚜️</h1>
    <p style="opacity: 0.5; font-size: 0.8rem; margin-bottom: 30px;">تفتح المذكرات مجاناً للمشتركين في أي كورس</p>

    <div class="admin-zone" id="admin-zone">
        <p style="margin-top:0; color: var(--gold); font-weight: bold;">إضافة مذكرة جديدة (لوحة الإدارة)</p>
        <input type="text" id="inp-title" placeholder="اسم المذكرة">
        <input type="text" id="inp-url" placeholder="رابط Google Drive">
        <button class="btn-post" onclick="uploadMemo()">رفع المذكرة للمكتبة</button>
    </div>

    <div id="memos-container"></div>
    
    <p id="empty-msg" style="display:none; text-align: center; opacity: 0.4; margin-top: 50px;">لا توجد مذكرات متاحة حالياً</p>
</div>

<div class="viewer-overlay" id="viewer-overlay">
    <div class="viewer-header">
        <span id="viewer-title" style="color: var(--gold); font-weight: bold;">جاري العرض...</span>
        <i class="fas fa-times close-viewer" onclick="closeViewer()"></i>
    </div>
    <iframe id="pdf-frame" src=""></iframe>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBfkxj5I7UOEETOf9GRqGgqEaEoqPtPMek",
        authDomain: "mrahmed-925d8.firebaseapp.com",
        databaseURL: "https://mrahmed-925d8-default-rtdb.firebaseio.com",
        projectId: "mrahmed-925d8",
        storageBucket: "mrahmed-925d8.firebasestorage.app",
        messagingSenderId: "83939909031",
        appId: "1:83939909031:web:adb0b10d41b9df6c602a82"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const userPhone = localStorage.getItem('userLoggedIn');
    let currentBalance = 0;
    let hasAnyCourse = false;
    let isAdmin = false;

    if (!userPhone) {
        window.location.href = "go.html";
    } else {
        // 1. مراقبة بيانات المستخدم والاشتراكات
        db.ref('students/' + userPhone).on('value', (snap) => {
            const user = snap.val();
            if (user) {
                currentBalance = user.balance || 0;
                isAdmin = user.role === 'admin' || userPhone === "01025768529";
                
                document.getElementById('welcome-msg').innerText = "يا أهلاً، " + user.name.split(' ')[0];
                document.getElementById('user-balance').innerText = currentBalance.toLocaleString();

                hasAnyCourse = false;
                if (user.courses) {
                    Object.values(user.courses).forEach(status => {
                        if (status === true) hasAnyCourse = true;
                    });
                }

                if (isAdmin) {
                    document.getElementById('admin-zone').style.display = 'block';
                    hasAnyCourse = true; 
                }
                
                loadLibrary();
            }
        });
    }

    // 2. جلب وعرض المذكرات من Firebase
    function loadLibrary() {
        const container = document.getElementById('memos-container');
        
        db.ref('library').on('value', (snap) => {
            container.innerHTML = '';
            
            if (!snap.exists()) {
                document.getElementById('empty-msg').style.display = 'block';
                return;
            }
            
            document.getElementById('empty-msg').style.display = 'none';

            snap.forEach((child) => {
                const memo = child.val();
                const memoId = child.key;
                
                let actionHtml = '';
                if (hasAnyCourse || isAdmin) {
                    actionHtml = `
                        <button class="action-btn" onclick="openViewer('${memo.url}', '${memo.title}')">
                            <i class="fas fa-eye"></i> عرض المذكرة (مجاناً)
                        </button>`;
                } else {
                    actionHtml = `
                        <button class="action-btn" onclick="buyMemo('${memoId}')">
                            <i class="fas fa-shopping-cart"></i> شراء المذكرة (50 ج)
                        </button>`;
                }

                container.innerHTML += `
                    <div class="memo-card" style="display: block !important; opacity: 1;">
                        <div class="memo-title">${memo.title}</div>
                        <div style="opacity: 0.6; margin-bottom: 20px; font-size: 0.9rem;">نسخة رقمية - الأستاذ أحمد شعبان</div>
                        ${actionHtml}
                        ${isAdmin ? `<span class="del-btn" onclick="deleteMemo('${memoId}')">حذف المذكرة نهائياً</span>` : ''}
                    </div>
                `;
            });
        });
    }

    // 3. نظام الشراء المباشر للمذكرة
    function buyMemo(id) {
        if (currentBalance >= 50) {
            if (confirm("هل تريد خصم 50 جنيهاً من رصيدك لفتح المذكرة؟")) {
                db.ref('students/' + userPhone).update({
                    balance: currentBalance - 50,
                    [`courses/memo_${id}`]: true 
                }).then(() => alert("تم الشراء! يمكنك الآن قراءة المذكرة."));
            }
        } else {
            alert("رصيدك غير كافٍ. يرجى شحن المحفظة أولاً.");
        }
    }

    // 4. معالج عرض الروابط
    function openViewer(url, title) {
        let finalUrl = url;
        if (finalUrl.includes('drive.google.com')) {
            let fileId = "";
            if (finalUrl.includes('/d/')) {
                fileId = finalUrl.split('/d/')[1].split('/')[0];
            } else if (finalUrl.includes('id=')) {
                fileId = finalUrl.split('id=')[1].split('&')[0];
            }
            finalUrl = `https://drive.google.com/file/d/${fileId}/preview`;
        }
        
        document.getElementById('viewer-title').innerText = title;
        document.getElementById('pdf-frame').src = finalUrl;
        document.getElementById('viewer-overlay').style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    function closeViewer() {
        document.getElementById('viewer-overlay').style.display = 'none';
        document.getElementById('pdf-frame').src = "";
        document.body.style.overflow = 'auto';
    }

    // 5. وظائف التحكم (للأدمن فقط)
    function uploadMemo() {
        const t = document.getElementById('inp-title').value;
        const u = document.getElementById('inp-url').value;
        if (t && u) {
            db.ref('library').push({
                title: t,
                url: u,
                createdAt: new Date().toISOString()
            }).then(() => {
                alert("تم الإضافة بنجاح!");
                document.getElementById('inp-title').value = '';
                document.getElementById('inp-url').value = '';
            });
        }
    }

    function deleteMemo(id) {
        if (confirm("هل أنت متأكد من الحذف؟")) {
            db.ref('library/' + id).remove();
        }
    }
</script>
</body>
</html>
