<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المكتبة الرقمية | الأستاذ أحمد شعبان</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #d4af37;
            --gold-gradient: linear-gradient(45deg, #d4af37, #f2d472);
            --card-bg: #1a1a1a;
            --bg-dark: #0a0a0a;
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Cairo', sans-serif;
            margin: 0; padding: 0; overflow-x: hidden;
        }

        .container { max-width: 900px; margin: 0 auto; padding: 20px; }

        /* المحفظة */
        .wallet-box {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.15), rgba(0,0,0,0.5));
            border: 1px solid var(--primary);
            padding: 15px 25px; border-radius: 20px; color: var(--primary);
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        /* لوحة الإدارة */
        .admin-zone {
            background: #161616; padding: 25px; border-radius: 20px;
            border: 1px dashed var(--primary); display: none; margin-bottom: 30px;
        }

        input, textarea {
            width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px;
            border: 1px solid #333; background: #000; color: #fff; font-family: 'Cairo';
        }

        .btn-post {
            width: 100%; padding: 15px; background: var(--gold-gradient);
            border: none; border-radius: 12px; font-weight: bold; cursor: pointer;
        }

        /* كروت المذكرات */
        .memo-card {
            background: var(--card-bg); border: 1px solid rgba(255,255,255,0.05);
            padding: 25px; border-radius: 25px; margin-bottom: 20px; transition: 0.3s;
        }
        .memo-card:hover { border-color: var(--primary); transform: translateY(-3px); }
        .memo-title { font-size: 1.4rem; color: var(--primary); font-weight: 700; margin-bottom: 5px; }
        .memo-desc { opacity: 0.7; font-size: 0.9rem; margin-bottom: 15px; line-height: 1.6; }

        .action-btn {
            background: var(--gold-gradient); color: #000; padding: 12px;
            border-radius: 10px; font-weight: 800; border: none; width: 100%; cursor: pointer;
        }

        .admin-controls { display: flex; gap: 10px; margin-top: 15px; justify-content: center; }
        .edit-btn { color: #4dabff; cursor: pointer; font-size: 0.85rem; }
        .del-btn { color: #ff4d4d; cursor: pointer; font-size: 0.85rem; }

        /* شاشة العرض المعدلة */
        .viewer-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: none; flex-direction: column;
        }
        .viewer-header {
            padding: 10px 20px; display: flex; justify-content: space-between; align-items: center;
            background: #111; border-bottom: 1px solid #222; z-index: 10002;
        }

        .iframe-container {
            position: relative; flex-grow: 1; 
            overflow-y: auto; overflow-x: hidden; /* تفعيل السكرول هنا */
            display: block; background: #1a1a1a;
            -webkit-overflow-scrolling: touch;
        }

        #pdf-frame { 
            width: 100%; height: 10000px; /* طول كبير لفك سكرول الدرايف */
            border: none; transition: transform 0.2s ease; transform-origin: top center; 
        }

        /* حماية المذكرة والعلامة المائية */
        .protection-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 5; background: transparent;
        }
        
        /* العلامة المائية العائمة الذكية */
        .watermark-float {
            position: fixed;
            pointer-events: none;
            z-index: 10001;
            color: rgba(212, 175, 55, 0.15); /* لون ذهبي شفاف جداً */
            font-size: 1.5rem;
            font-weight: bold;
            white-space: nowrap;
            user-select: none;
            display: none;
        }

        .anti-steal-home {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 6rem; color: rgba(212, 175, 55, 0.05); cursor: pointer; z-index: 4;
        }

        /* أدوات التحكم العائمة */
        .floating-tools {
            position: fixed; bottom: 30px; left: 20px; display: flex;
            flex-direction: column; gap: 15px; z-index: 10000;
        }
        .tool-btn {
            width: 50px; height: 50px; background: var(--primary);
            color: #000; border-radius: 50%; display: flex; align-items: center;
            justify-content: center; cursor: pointer; font-size: 1.2rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); border: none;
        }

        .close-v { background: #222; color: #ff4d4d; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="user-watermark" class="watermark-float"></div>

<div class="container">
    <div class="wallet-box">
        <span id="welcome-msg"><i class="fas fa-spinner fa-spin"></i></span>
        <div><i class="fas fa-wallet"></i> <span id="user-balance">0</span> ج.م</div>
    </div>

    <div style="text-align: center; margin-bottom: 30px;">
        <h1 style="color: var(--primary); margin: 0;">المكتبة الرقمية ⚜️</h1>
        <p style="opacity: 0.6;">مذكرات الصف الأول الثانوي - أ/ أحمد شعبان</p>
    </div>

    <div class="admin-zone" id="admin-zone">
        <h3 id="form-title" style="margin:0; color: var(--primary);">إضافة مذكرة جديدة</h3>
        <input type="hidden" id="edit-id">
        <input type="text" id="inp-title" placeholder="عنوان المذكرة">
        <textarea id="inp-desc" placeholder="وصف قصير للمحتوى..." rows="2"></textarea>
        <input type="text" id="inp-url" placeholder="رابط Google Drive">
        <button class="btn-post" id="btn-save" onclick="uploadMemo()">نشر المذكرة</button>
        <button id="btn-cancel" onclick="resetForm()" style="display:none; background:none; border:none; color: grey; width:100%; margin-top:10px; cursor:pointer;">إلغاء التعديل</button>
    </div>

    <div id="memos-container"></div>
</div>

<div class="viewer-overlay" id="viewer-overlay">
    <div class="viewer-header">
        <div class="close-v" onclick="closeViewer()"><i class="fas fa-times"></i></div>
        <span id="viewer-title" style="color: var(--primary); font-weight: bold;">عرض المذكرة</span>
        <div style="width:35px"></div>
    </div>

    <div class="iframe-container" id="scroll-wrapper">
        <div class="protection-layer"></div>
        <a href="index.html" class="anti-steal-home"><i class="fas fa-home"></i></a>
        <iframe id="pdf-frame" src=""></iframe>
    </div>

    <div class="floating-tools">
        <button class="tool-btn" onclick="zoomPDF(0.1)" title="تكبير"><i class="fas fa-search-plus"></i></button>
        <button class="tool-btn" onclick="zoomPDF(-0.1)" title="تصغير"><i class="fas fa-search-minus"></i></button>
        <button class="tool-btn" onclick="smoothScroll(400)" title="لأسفل"><i class="fas fa-chevron-down"></i></button>
        <button class="tool-btn" onclick="smoothScroll(-400)" title="لأعلى"><i class="fas fa-chevron-up"></i></button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBfkxj5I7UOEETOf9GRqGgqEaEoqPtPMek",
        authDomain: "mrahmed-925d8.firebaseapp.com",
        databaseURL: "https://mrahmed-925d8-default-rtdb.firebaseio.com",
        projectId: "mrahmed-925d8",
        storageBucket: "mrahmed-925d8.firebasestorage.app",
        messagingSenderId: "83939909031",
        appId: "1:83939909031:web:adb0b10d41b9df6c602a82"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const userPhone = localStorage.getItem('userLoggedIn');
    let currentBalance = 0, isAdmin = false, currentZoom = 1, userName = "";

    if (!userPhone) { window.location.href = "go.html"; }

    // مراقبة بيانات المستخدم
    db.ref('students/' + userPhone).on('value', (snap) => {
        const user = snap.val();
        if (user) {
            userName = user.name;
            currentBalance = user.balance || 0;
            isAdmin = user.role === 'admin' || userPhone === "01025768529";
            document.getElementById('welcome-msg').innerText = "يا أهلاً، " + user.name.split(' ')[0];
            document.getElementById('user-balance').innerText = currentBalance.toLocaleString();
            if (isAdmin) document.getElementById('admin-zone').style.display = 'block';
            loadLibrary(user.courses || {});
            
            // تحديث محتوى العلامة المائية
            document.getElementById('user-watermark').innerText = `${userName} - ${userPhone}`;
        }
    });

    function loadLibrary(userCourses) {
        const container = document.getElementById('memos-container');
        db.ref('library').on('value', (snap) => {
            container.innerHTML = '';
            snap.forEach((child) => {
                const memo = child.val();
                const id = child.key;
                const isOwned = userCourses[`memo_${id}`] === true || isAdmin;

                container.innerHTML += `
                    <div class="memo-card">
                        <div class="memo-title">${memo.title}</div>
                        <div class="memo-desc">${memo.desc || 'لا يوجد وصف متاح لهذه المذكرة.'}</div>
                        <button class="action-btn" onclick="${isOwned ? `openViewer('${memo.url}', '${memo.title}')` : `buyMemo('${id}')`}">
                            ${isOwned ? '<i class="fas fa-eye"></i> فتح المذكرة' : '<i class="fas fa-shopping-cart"></i> شراء (50 ج.م)'}
                        </button>
                        ${isAdmin ? `
                            <div class="admin-controls">
                                <span class="edit-btn" onclick="editMemo('${id}', '${memo.title}', '${memo.desc}', '${memo.url}')"><i class="fas fa-edit"></i> تعديل</span>
                                <span class="del-btn" onclick="deleteMemo('${id}')"><i class="fas fa-trash"></i> حذف</span>
                            </div>
                        ` : ''}
                    </div>
                `;
            });
        });
    }

    // وظائف العرض والتحكم الجديدة
    function openViewer(url, title) {
        let fileId = "";
        if (url.includes('/d/')) {
            fileId = url.split('/d/')[1].split('/')[0];
        } else if (url.includes('id=')) {
            fileId = url.split('id=')[1].split('&')[0];
        }

        document.getElementById('pdf-frame').src = `https://drive.google.com/file/d/${fileId}/preview`;
        document.getElementById('viewer-title').innerText = title;
        document.getElementById('viewer-overlay').style.display = 'flex';
        document.body.style.overflow = 'hidden';

        // تفعيل العلامة المائية المتحركة
        startWatermark();

        // إعادة ضبط السكرول والزووم
        const wrapper = document.getElementById('scroll-wrapper');
        wrapper.scrollTop = 0;
        currentZoom = 1;
        document.getElementById('pdf-frame').style.transform = `scale(1)`;
        document.getElementById('pdf-frame').style.width = "100%";
    }

    function closeViewer() {
        document.getElementById('viewer-overlay').style.display = 'none';
        document.getElementById('pdf-frame').src = '';
        document.body.style.overflow = 'auto';
        stopWatermark();
    }

    function smoothScroll(amount) {
        const wrapper = document.getElementById('scroll-wrapper');
        wrapper.scrollBy({ top: amount, behavior: 'smooth' });
    }

    function zoomPDF(change) {
        currentZoom += change;
        if (currentZoom < 0.6) currentZoom = 0.6;
        if (currentZoom > 2.5) currentZoom = 2.5;
        
        const frame = document.getElementById('pdf-frame');
        frame.style.transform = `scale(${currentZoom})`;
        frame.style.width = (100 / currentZoom) + "%";
    }

    // نظام العلامة المائية العائمة المتحركة
    let watermarkInterval;
    function startWatermark() {
        const wm = document.getElementById('user-watermark');
        wm.style.display = 'block';
        
        function moveWM() {
            const x = Math.random() * (window.innerWidth - 200);
            const y = Math.random() * (window.innerHeight - 50);
            wm.style.left = x + 'px';
            wm.style.top = y + 'px';
        }
        
        moveWM();
        watermarkInterval = setInterval(moveWM, 4000); // تتحرك كل 4 ثواني لمكان جديد
    }

    function stopWatermark() {
        document.getElementById('user-watermark').style.display = 'none';
        clearInterval(watermarkInterval);
    }

    // وظائف الإدارة
    function uploadMemo() {
        const title = document.getElementById('inp-title').value;
        const desc = document.getElementById('inp-desc').value;
        const url = document.getElementById('inp-url').value;
        const editId = document.getElementById('edit-id').value;

        if (title && url) {
            const data = { title, desc, url, createdAt: new Date().toISOString() };
            const ref = editId ? db.ref('library/' + editId) : db.ref('library').push();
            
            ref.set(data).then(() => {
                alert(editId ? "تم التعديل بنجاح!" : "تم نشر المذكرة!");
                resetForm();
            });
        } else {
            alert("يرجى ملء العنوان والرابط!");
        }
    }

    function editMemo(id, title, desc, url) {
        document.getElementById('edit-id').value = id;
        document.getElementById('inp-title').value = title;
        document.getElementById('inp-desc').value = desc === 'undefined' ? '' : desc;
        document.getElementById('inp-url').value = url;
        document.getElementById('form-title').innerText = "تعديل المذكرة";
        document.getElementById('btn-save').innerText = "حفظ التعديلات";
        document.getElementById('btn-cancel').style.display = "block";
        window.scrollTo(0, 0);
    }

    function resetForm() {
        document.getElementById('edit-id').value = '';
        document.getElementById('inp-title').value = '';
        document.getElementById('inp-desc').value = '';
        document.getElementById('inp-url').value = '';
        document.getElementById('form-title').innerText = "إضافة مذكرة جديدة";
        document.getElementById('btn-save').innerText = "نشر المذكرة";
        document.getElementById('btn-cancel').style.display = "none";
    }

    function deleteMemo(id) {
        if (confirm("هل أنت متأكد من حذف هذه المذكرة نهائياً؟")) {
            db.ref('library/' + id).remove();
        }
    }

    function buyMemo(id) {
        if (currentBalance >= 50) {
            if (confirm("هل تريد شراء هذه المذكرة مقابل 50 جنيهاً؟")) {
                db.ref('students/' + userPhone).update({
                    balance: currentBalance - 50,
                    [`courses/memo_${id}`]: true 
                }).then(() => {
                    alert("تم الشراء بنجاح! يمكنك الآن فتح المذكرة.");
                });
            }
        } else { 
            alert("رصيدك الحالي (" + currentBalance + ") لا يكفي لشراء المذكرة."); 
        }
    }
</script>
</body>
</html>
